experiment:
  name: baseline
  seed: 42
  output_dir: reports/runs/baseline

data:
  mode: synthetic
  image_size: 128
  num_samples: 64
  batch_size: 16
  train_split: 0.75
  raw_dir: data/raw
  processed_dir: data/processed
  generated_dir: data/generated

generation:
  enabled: true
  method: toy_blend
  strength: 0.35

model:
  name: tiny_cnn
  checkpoint_path: models/tiny_cnn.pt
  epochs: 1
  learning_rate: 0.001

attack:
  enabled: true
  method: fgsm
  epsilon: 0.03

defense:
  enabled: true
  method: jpeg_smoothing
  jpeg_quality: 75
  adversarial_training: false

evaluation:
  metrics:
    - accuracy
    - roc_auc
