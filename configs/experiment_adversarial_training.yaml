experiment:
  name: adversarial_training
  seed: 42
  output_dir: reports/runs/adversarial_training

data:
  mode: synthetic
  image_size: 128
  num_samples: 64
  batch_size: 16
  train_split: 0.75
  raw_dir: data/raw
  processed_dir: data/processed
  generated_dir: data/generated

generation:
  enabled: false

model:
  name: tiny_cnn
  checkpoint_path: models/tiny_cnn.pt
  # Baseline model: train from scratch first
  epochs: 3
  learning_rate: 0.001
  train: true
  load_checkpoint: false

attack:
  enabled: true
  epsilons:
    - 0.01
  ifgsm_epsilon: 0.01
  ifgsm_steps: 10
  pgd_epsilon: 0.01
  pgd_alpha: 0.001
  pgd_steps: 20

defense:
  enabled: false

# Adversarial Training (Stage 6) — enabled
adversarial_training:
  enabled: true
  attack_fn: pgd          # Attack used during adversarial training ("pgd" or "fgsm")
  epsilon: 0.01           # Perturbation budget ε
  alpha: 0.001            # Per-step size for PGD
  steps: 10               # PGD steps during training (cheaper than eval)
  adv_lambda: 1.0         # λ weight for adversarial loss
  epochs: 5               # Number of adversarial training epochs
  checkpoint_dir: checkpoints

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
    - asr
